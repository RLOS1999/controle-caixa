<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Caixa Comercial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        h1 {
            text-align: center;
            color: white;
            font-weight: bold;
            background: linear-gradient(to right, red, orange);
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            width: 80%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px auto;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: orange;
            color: black;
            font-weight: bold;
        }

        input[type="text"], input[type="number"] {
            width: 90%;
            padding: 5px;
            box-sizing: border-box;
        }

        select {
            width: 90%;
            padding: 5px;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }

        .obs-container {
            position: relative;
        }

        .obs-input {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 200px;
            padding: 5px;
            border: 1px solid gray;
            border-radius: 5px;
            background-color: white;
            z-index: 10;
        }

        .obs-input:focus {
            border-color: red;
        }

        .obs-container:hover .obs-input {
            display: block;
        }

        .obs-container.has-obs > input:first-child {
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Controle de Caixa Comercial</h1>

    <table>
        <thead>
            <tr>
                <th>AUTOZONER</th>
                <th>CLIENTE</th>
                <th>PAGAMENTO</th>
                <th>TROCO</th>
                <th>TOTAL</th>
                <th>MOTOBOY</th>
                <th>PAGO</th>
            </tr>
        </thead>
        <tbody id="caixaTable">
            <tr>
                <td><input type="text" placeholder="Nome do Autozoner"></td>
                <td>
                    <div class="obs-container">
                        <input type="text" placeholder="Nome do Cliente" oninput="checkObs(this)">
                        <input type="text" class="obs-input" placeholder="Observação" oninput="markObs(this)">
                    </div>
                </td>
                <td>
                    <select>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao">Cartão</option>
                        <option value="pix">PIX</option>
                    </select>
                </td>
                <td><input type="number" placeholder="R$0,00" step="0.01"></td>
                <td><input type="number" placeholder="R$0,00" step="0.01"></td>
                <td><input type="text" placeholder="Nome do Motoboy"></td>
                <td><input type="checkbox"></td>
            </tr>
        </tbody>
    </table>

    <button onclick="clearTable()">Limpar Tudo</button>

    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addRow();
            }
        });

        function addRow() {
            const table = document.getElementById('caixaTable');
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td><input type="text" placeholder="Nome do Autozoner"></td>
                <td>
                    <div class="obs-container">
                        <input type="text" placeholder="Nome do Cliente" oninput="checkObs(this)">
                        <input type="text" class="obs-input" placeholder="Observação" oninput="markObs(this)">
                    </div>
                </td>
                <td>
                    <select>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao">Cartão</option>
                        <option value="pix">PIX</option>
                    </select>
                </td>
                <td><input type="number" placeholder="R$0,00" step="0.01"></td>
                <td><input type="number" placeholder="R$0,00" step="0.01"></td>
                <td><input type="text" placeholder="Nome do Motoboy"></td>
                <td><input type="checkbox"></td>
            `;

            table.appendChild(newRow);
        }

        function clearTable() {
            const table = document.getElementById('caixaTable');
            table.innerHTML = '';
            addRow(); // Adiciona uma nova linha ao limpar tudo
        }

        function markObs(obsInput) {
            const container = obsInput.closest('.obs-container');
            if (obsInput.value.trim() !== '') {
                container.classList.add('has-obs');
            } else {
                container.classList.remove('has-obs');
            }
        }

        function checkObs(clientInput) {
            const container = clientInput.closest('.obs-container');
            const obsInput = container.querySelector('.obs-input');
            if (obsInput.value.trim() !== '') {
                container.classList.add('has-obs');
            } else {
                container.classList.remove('has-obs');
            }
        }
    </script>
</body>
</html>
